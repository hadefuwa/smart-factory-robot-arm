<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Arm (MVP) - Smart Factory</title>
  <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
  <link href="/assets/css/matrix-ui-template.css" rel="stylesheet" />
  <link href="/assets/css/professional-theme.css" rel="stylesheet" />
  <style>
    .robot-arm-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }
    .robot-arm-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 900px) {
      .robot-arm-grid {
        grid-template-columns: 1fr;
      }
    }
    .robot-status-box {
      font-family: monospace;
      white-space: pre-wrap;
      background: var(--sf-base-100);
      border: 1px solid var(--sf-base-300);
      border-radius: 0.75rem;
      padding: 0.75rem;
      min-height: 12rem;
      max-height: 20rem;
      overflow: auto;
    }
    .small-help {
      font-size: 0.85rem;
      color: var(--sf-base-muted);
    }
  </style>
</head>
<body>
  <main class="robot-arm-shell">
    <div class="card p-4">
      <h1 class="mb-2">Robot Arm (MVP Web Control)</h1>
      <p class="mb-1">This page controls the RobotArmv3 Pi service through your Flask backend.</p>
      <p class="small-help mb-0">Legacy Dobot page: <a href="/dobot.html">/dobot.html</a></p>
    </div>

    <div class="robot-arm-grid">
      <div class="card p-4">
        <h3 class="mb-3">1) Connection</h3>
        <div class="mb-2">
          <label for="piHost" class="small-help">Pi Host</label>
          <input id="piHost" class="form-control" type="text" value="robot-arm.local" />
        </div>
        <div class="mb-3">
          <label for="piPort" class="small-help">Pi Port</label>
          <input id="piPort" class="form-control" type="number" value="8080" />
        </div>
        <div class="d-flex gap-2">
          <button id="connectBtn" class="btn btn-primary">Connect</button>
          <button id="disconnectBtn" class="btn btn-outline-secondary">Disconnect</button>
        </div>
        <p id="connectionText" class="mt-3 mb-0 small-help">Status: Not connected</p>
      </div>

      <div class="card p-4">
        <h3 class="mb-3">2) Joint Move</h3>
        <div class="mb-2">
          <label for="jointNumber" class="small-help">Joint Number (1-based)</label>
          <input id="jointNumber" class="form-control" type="number" min="1" value="1" />
        </div>
        <div class="mb-3">
          <label for="jointAngle" class="small-help">Angle (degrees)</label>
          <input id="jointAngle" class="form-control" type="number" value="45" />
        </div>
        <div class="d-flex gap-2">
          <button id="moveBtn" class="btn btn-success">Move Joint</button>
          <button id="stopBtn" class="btn btn-danger">Stop All</button>
        </div>
      </div>
    </div>

    <div class="card p-4">
      <h3 class="mb-3">3) Live Status (500ms polling)</h3>
      <div id="statusBox" class="robot-status-box">Waiting for status...</div>
    </div>
  </main>

  <script src="/assets/js/robot-arm-v3-page.js"></script>
</body>
</html>
